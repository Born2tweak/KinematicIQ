name: external_blocker
milestones:
  - {id: squat-study, protocol_id: squat-v1, status: BlockedExternal, result_code: BLOCKED_EXTERNAL_WITH_OWNER}
  - id: squat-disposition
    protocol_id: squat-v1
    status: Passed
    kind: release_disposition
    dependencies:
      - {id: squat-study, accepted_statuses: [BlockedExternal], allow_blocked_disposition: true}
  - {id: lunge-engineering, protocol_id: lunge-v1, status: Pending}
protocols:
  - id: squat-v1
    decisions:
      - kind: BlockedExternal
        current: true
        owner: lab-coordinator
        next_action: obtain instrument booking
  - {id: lunge-v1}
expected:
  ready_queue: [lunge-engineering]
  protocols:
    lunge-v1: {lifecycle: Candidate, data_ready: false, engineering_ready: false, validation_ready: false}
    squat-v1: {lifecycle: BlockedExternal, data_ready: false, engineering_ready: false, validation_ready: false}
  terminal_dispositions: {squat-v1: BlockedExternal}
