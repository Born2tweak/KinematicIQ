    first_action: Lock the evidence-supported drop height before requesting a safety-approved platform and site.
    next_action_due: within 2 execution days of start_trigger
    approval_route: Andrian Kolliegbo for outreach/relationship commitment; privacy or institutional authority when applicable
    escalation: If no scientifically valid no-cost path is confirmed by target_lead_time_days, present cost, scope-narrowing, and partnership
      options for owner decision.
    contact_log_artifact: docs/program/resources/res-calibrated_platform-contact-log.yaml
- id: RES-PARTNER
  name: Institutional capture and validation partner
  status: UnresolvedExternal
  required_for:
  - instrumented_validation
  minimum_path: Named contact, written scope, facility/equipment access, data-use terms, schedule, and export rights.
  candidate_sources:
  - Purdue faculty laboratories
  - Purdue athletics performance staff
  - local clinics
