schema_version: 4
program_id: kinematiciq-expanded-10
status: candidate_execution_contract_repository_verification_pending
registry_generated_from: docs/implementation/KINEMATICIQ_MASTER_EXECUTION_ROADMAP.md
registry_policy:
  default_branch: agent/expanded-10-revision-4
  automatic_commit: true
  automatic_push: true
  automatic_production_deploy: false
  fail_closed: true
  status_model: milestone status, scientific result code, and protocol lifecycle are separate dimensions
  ready_rule: every dependency condition accepts the dependency milestone status and every required resource is READY or the node is a disposition
    node that explicitly records the blocker
  blocked_rule: a blocker pauses only the affected node and descendants; a terminal-disposition node may accept a recorded human/external blocker
    without granting release eligibility
  release_rule: ReleaseEligible requires GATE_PASS; no blocked, failed, skipped, or missing outcome can satisfy it
  dependency_authority: dependencies are authoritative; unlocks are generated and checked as a reversible index
milestones:
- id: KQ-001
  title: Reconcile repository frontier
  phase: A
  class: blocking_kernel
  milestone_status: Pending
  expected_work_hours: 4
  objective: 'Produce and verify one bounded outcome: Reconcile repository frontier.'
  user_visible_outcome: none
  dependencies: []
  soft_dependencies: []
  resource_dependencies: []
  requirements:
  - required dependencies are PASS or conditionally skipped by an explicit negative decision
  evidence_inputs: []
  in_scope:
  - Code/docs/commits/current availability and blocked evidence agree
  - Current milestone artifacts, evidence, and directly affected tests only
  out_of_scope:
  - Production deployment or public activation
  - Weakening preregistered scientific, privacy, or safety gates
  artifacts:
  - docs/program/artifacts/kq-001.yaml
  - docs/status/milestones/KQ-001.json
  acceptance:
  - id: KQ-001-A1
    predicate: all_artifacts_exist_and_nonempty
    inputs:
    - docs/program/artifacts/kq-001.yaml
    - docs/status/milestones/KQ-001.json
  - id: KQ-001-A2
    predicate: current_run_evidence_matches_head
    evidence: docs/status/milestones/KQ-001.json
    expected:
      milestone_id: KQ-001
      all_required_checks_passed: true
  - id: KQ-001-A3
    predicate: contract_output_assertion_passes
    contract: docs/program/artifacts/kq-001.yaml
    assertion_id: KQ-001-OUTCOME
  verification:
    profile: program_contract
    automated:
    - id: registry_contract
      command: python tools/program/verify_milestone.py --registry docs/program/milestone_registry.yaml --schema docs/program/milestone_schema.yaml
        --id KQ-001
    - id: targeted_contract_checks
      command: python tools/program/run_contract_checks.py --id KQ-001 --evidence-out docs/status/milestones/KQ-001.json
    manual_gate: null
    clean_clone_required: false
  failure:
    classify_as: FailedTechnical
    abstain_or_rollback: Do not advance lifecycle or public claims; preserve evidence, create a revert commit only for changed code, and continue
      the unaffected ready queue
    research_trigger: Open a bounded research job only when diagnosis identifies a decision-critical knowledge or evidence gap
    retry_budget: 2
    locked_evidence_retuning_forbidden: false
  outcomes:
