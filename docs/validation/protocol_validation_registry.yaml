schema_version: 2
program_id: kinematiciq-expanded-10
policy:
  population: healthy_adults_and_athletes
  public_experimental_route: forbidden
  minimum_product_rule: Every protocol must pass a useful minimum measurement set; optional metrics may abstain independently.
  interpretation_rule: One evidence-bounded interpretation is required; a claim that coaching improves movement requires a separate intervention-effect
    gate.
  threshold_rule: UNSET_BLOCKING is an explicit registered blocker and cannot be treated as a wildcard or pass.
  registry_role: These records seed evidence synthesis and preregistration; they do not authorize opening locked evidence.
  equal_rigor_rule: Use the same decision discipline for every claim, but select the least burdensome reference tier that directly measures that
    claim.
  manifest_creation_rule: Create one signed validation_manifest.yaml per protocol only after task, claims, thresholds, sample rule, supported
    cells, references, resources, and privacy are resolved.
metric_class_gates:
  count:
    required_reporting:
    - exact_session_accuracy
    - insertion_rate
    - deletion_rate
    - participant_level_confidence_interval
  event_time:
    required_reporting:
    - bias_ms
    - mae_ms
    - limits_of_agreement_ms
    - frame_rate_strata
    - participant_level_confidence_interval
  continuous_kinematic:
    required_reporting:
    - bias
    - mae
    - rmse
    - limits_of_agreement
    - calibration
    - participant_level_confidence_interval
  spatiotemporal:
    required_reporting:
    - bias
    - mae
    - limits_of_agreement
    - scale_error
    - participant_level_confidence_interval
  categorical_interpretation:
    required_reporting:
    - confusion_matrix
    - sensitivity
    - specificity
    - agreement
    - evidence_scope
  intervention_effect:
    required_reporting:
    - preregistered_comparator
    - participant_level_effect
    - uncertainty
    - harms
    - transfer_limitations
protocols:
  squat:
    canonical_task: Bodyweight bilateral squat with frozen start, depth, return, tempo, and invalid-trial rules.
    initial_supported_cells:
    - left_side_live
    - right_side_live
    - left_side_upload
    - right_side_upload
    minimum_claims:
    - valid_rep_count
    - bottom_event
    - return_event
    - projected_knee_angle
    - trunk_inclination
    - evidence_bounded_interpretation
    criterion_references:
    - two_qualified_raters
    - synchronized_kinematics
    - repeat_sessions
    evidence_pack_status: OpenBlocking
    registered_unknowns:
    - decision_relevant_angle_error
    - participant_precision_target
    - validated_device_cells
    contract_status: PreRegistrationOpen
    reference_justification:
      event_and_count: two qualified blinded raters
      projected_kinematics: synchronized criterion kinematics
      repeatability: repeat sessions
    locked_manifest_path: docs/validation/squat/validation_manifest.yaml
    lock_preconditions:
    - dedicated primary-source evidence pack audited
    - task and minimum core claims frozen
    - numeric thresholds and participant-level sample rule preregistered
    - supported view/device/input cells frozen
    - reference access and synchronization confirmed
    - privacy, consent, custody, and required signatures complete
  forward_lunge:
