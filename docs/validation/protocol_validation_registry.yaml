validation_manifest_template:
  required_fields:
  - protocol_version
  - preregistration_hash
  - code_hash
  - model_hash
  - dataset_hashes
  - participant_unit
  - sample_rule
  - exclusions
  - missingness
  - core_claims
  - supported_cells
  - thresholds
  - false_confidence_limit
  - reliability_rules
  - signatures
  forbidden_values_at_lock:
  - TBD
  - null
  - unset
  - later
  - best_effort
  locked_data_rule: Opening locked evidence before manifest freeze invalidates the candidate version.
status: preregistration_work_queue_not_locked_validation_manifests
